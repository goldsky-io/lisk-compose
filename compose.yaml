name: "lisk-redstone-oracle"
api_version: "preview"
sponsor_gas: true

env:
  cloud:
    ORACLE_ADDRESS: "0x005811A0433AD708da9d867169d4993329554FBe"
    TARGET_ADDRESS: "0x57d2460f4f401f1a675a2dc282344f926797e8e7"
    MULTICALL3_ADDRESS: "0xcA11bde05977b3631167028862bE2a173976CA11"
    SYMBOLS: "ETH,LSK,USDT,USDC,WBTC,BTC,wstETH/ETH"
    DATA_SERVICE_ID: "redstone-primary-prod"
    UNIQUE_SIGNERS_COUNT: "2"
    MIN_DEVIATION_PERCENT: "0.5"
    MIN_TIME_ELAPSED_HOURS: "6"
    CHAIN: "lisk"
    LISK_RPC_URL: "https://rpc.api.lisk.com"
  local:
    ORACLE_ADDRESS: "0x005811A0433AD708da9d867169d4993329554FBe"
    TARGET_ADDRESS: "0x57d2460f4f401f1a675a2dc282344f926797e8e7"
    MULTICALL3_ADDRESS: "0xcA11bde05977b3631167028862bE2a173976CA11"
    SYMBOLS: "ETH,LSK,USDT,USDC,WBTC,BTC,wstETH/ETH"
    DATA_SERVICE_ID: "redstone-primary-prod"
    UNIQUE_SIGNERS_COUNT: "2"
    MIN_DEVIATION_PERCENT: "0.5"
    MIN_TIME_ELAPSED_HOURS: "6"
    CHAIN: "lisk"
    LISK_RPC_URL: "https://rpc.api.lisk.com"

tasks:
  - name: "update_price_feeds"
    path: "./src/tasks/update-price-feeds.ts"
    triggers:
      - type: "cron"
        expression: "* * * * *"
    retry_config:
      max_attempts: 2
      initial_interval_ms: 5000
      backoff_factor: 2
